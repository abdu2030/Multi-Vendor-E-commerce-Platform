name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-build-and-scan:
    name: Test, Build, And Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Audit dependencies report
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Audit high and critical dependency gate
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Build API image
        run: docker build -f Dockerfile.api -t marketo-api:ci .

      - name: Build web image
        run: docker build -f Dockerfile.web -t marketo-web:ci .

      - name: Confirm API image has no env files
        run: |
          docker run --rm --entrypoint sh marketo-api:ci -c 'if find /app -name ".env*" -print -quit | grep -q .; then find /app -name ".env*"; exit 1; fi'

      - name: Confirm web image has no env files
        run: |
          docker run --rm --entrypoint sh marketo-web:ci -c 'if find /app -name ".env*" -print -quit | grep -q .; then find /app -name ".env*"; exit 1; fi'
